name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod -R +x node_modules/.bin

      - name: Run tests with coverage
        run: npx jest --coverage --ci