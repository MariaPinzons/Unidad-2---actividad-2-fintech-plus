name: CI Pipeline


on:
  push:
  pull_request:


jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v3


      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install


      - name: Run tests with coverage
        run: npx jest --coverage --ci